<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Unknot Program</title>

<style>
body {
  background-color: #000080;
  font-family: Verdana, Arial, sans-serif;
  margin: 0;
}

#banner {
  background: linear-gradient(to right, #c0c0c0, #ffccff);
  border-bottom: 4px ridge white;
  padding: 12px;
  text-align: center;
  font-size: 26px;
}

#container {
  display: flex;
}

#sidebar {
  width: 200px;
  background: #c0c0c0;
  border-right: 4px ridge white;
  padding: 10px;
}

#main {
  flex: 1;
  background: #ffffcc;
  padding: 20px;
}

.button {
  background: #e0e0e0;
  border: 3px outset white;
  margin-bottom: 8px;
  padding: 8px;
  text-align: center;
  cursor: pointer;
  font-weight: bold;
}

.blink {
  animation: blink 1s infinite;
  color: red;
}

@keyframes blink { 50% { opacity: 0; } }

.box {
  background: white;
  border: 2px inset #999;
  padding: 10px;
  margin-top: 15px;
}

.slide-wrapper {
  background: #999;
  padding: 30px;
  display: flex;
  justify-content: center;
}

.slide {
  background: white;
  width: 720px;
  height: 380px;
  padding: 20px;
  border: 3px solid black;
  box-shadow: 6px 6px black;
  display: flex;
  flex-direction: column;
}

.slide-content {
  display: flex;
  flex: 1;
}

.slide-text {
  flex: 2;
}

.slide-image {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.slide-image img {
  width: 140px;
  border: none;
}

.nav-bar {
  display: flex;
  justify-content: space-between;
}

#errorScreen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0000aa;
  color: white;
  font-family: monospace;
  padding: 40px;
  z-index: 999;
}

#assistant {
  position: fixed;
  bottom: 10px;
  left: 10px;
  width: 210px;
  background: #c0c0c0;
  border: 3px outset white;
  font-size: 12px;
}

#assistant-header {
  background: purple;
  color: white;
  padding: 3px;
  display: flex;
  justify-content: space-between;
}

#chat {
  height: 70px;
  overflow: hidden;
  background: white;
  padding: 5px;
}

.bubble {
  background: #e0e0ff;
  margin: 3px;
  padding: 4px;
  border-radius: 5px;
}

.option {
  background: #e0e0e0;
  margin: 2px;
  padding: 2px;
  cursor: pointer;
  text-align: center;
}

.hidden { display: none; }

</style>
</head>

<body>

<div id="banner">THE UNKNOT PROGRAM</div>

<div id="container">

<div id="sidebar">
<div class="button" onclick="goHome()">Home</div>
<div class="button" onclick="showAbout()">About</div>
<div class="button" onclick="startSlides()"><span class="blink">NEW</span> Begin Learning</div>
<div class="button" onclick="showProgress()">Progress</div>
<div class="button" onclick="termsPage()">Terms</div>
</div>

<div id="main">

<h2>Welcome</h2>
<p>
Welcome to The Unknot Program.<br><br>
Click the tabs on the left for more information. 
</p>


</div>

</div>

<div id="errorScreen">
<h1>STOP: 0x00034F SYSTEM MISALIGNMENT</h1>
<button onclick="restart()">RESTART</button>
</div>

<div id="assistant">
<div id="assistant-header">
<span>Assist</span>
<span onclick="toggleAI()">X</span>
</div>
<div id="chat"></div>
<div class="option" onclick="aiRespond('start')">How do I start?</div>
<div class="option" onclick="aiRespond('safe')">Is this safe?</div>
<div class="option" onclick="aiRespond('leave')">Can I leave?</div>
<div class="option" onclick="aiRespond('why')">Why am I here?</div>
</div>

<script>
let slideIndex = 0;

function startSlides() {
  slideIndex = 0;
  showSlide();
}

function showSlide() {
  const slides = [
`<div class="slide-wrapper"><div class="slide">
<h2>Understanding Thought</h2>
<div class="slide-content">
<div class="slide-text">
<ul>
<li>Thoughts can become disorganized</li>
<li>Disorganization reduces clarity</li>
<li>Clarity improves outcomes</li>
</ul>
</div>
<div class="slide-image">
<img src="brain1.gif"><img src="spiral.gif">
</div>
</div>
<div class="nav-bar"><span>1 / 4</span><button onclick="nextSlide()">Next</button></div>
</div></div>`,

`<div class="slide-wrapper"><div class="slide">
<h2>Reducing Strain</h2>
<div class="slide-content">
<div class="slide-text">
<ul>
<li>Too many thoughts create pressure</li>
<li>Pressure creates discomfort</li>
<li>Reducing thought reduces strain</li>
</ul>
</div>
<div class="slide-image">
<img src="brain2.gif"><img src="static.gif">
</div>
</div>
<div class="nav-bar"><span>2 / 4</span><button onclick="nextSlide()">Next</button></div>
</div></div>`,

`<div class="slide-wrapper"><div class="slide">
<h2>Alignment</h2>
<div class="slide-content">
<div class="slide-text">
<ul>
<li>Aligned thinking is efficient</li>
<li>Aligned thinking is simple</li>
<li>You are learning alignment</li>
</ul>
</div>
<div class="slide-image">
<img src="organs.gif"><img src="grid.gif">
</div>
</div>
<div class="nav-bar"><span>3 / 4</span><button onclick="nextSlide()">Next</button></div>
</div></div>`,

`<div class="slide-wrapper"><div class="slide">
<h2>Notice</h2>
<ul>
<li>You continued</li>
<li>You did not stop</li>
<li>This matters</li>
</ul>
<div class="nav-bar"><span>4 / 4</span><button onclick="triggerError()">Continue</button></div>
</div></div>`
];

  document.getElementById("main").innerHTML = slides[slideIndex];
}

function nextSlide() {
  slideIndex++;
  showSlide();
}

function triggerError() {
  document.getElementById("container").style.display = "none";
  document.getElementById("errorScreen").style.display = "block";
}

function restart() {
  window.location.href = "second.html";
}

function termsPage() {
  document.getElementById("main").innerHTML = "accept ".repeat(300);
}

function aiRespond(type) {
  let chat = document.getElementById("chat");
  chat.innerHTML = "";

  let bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = "...";
  chat.appendChild(bubble);

  setTimeout(() => {
    let responses = {
      start: "Select Begin Learning.",
      safe: "There is no risk in continuing.",
      leave: "Leaving is not required.",
      why: "You chose to be here."
    };
    bubble.innerText = responses[type];
  }, 500);
}

function toggleAI() {
  document.getElementById("assistant").classList.toggle("hidden");
}

function goHome() {
  document.getElementById("main").innerHTML = `
<h2>Welcome</h2>
<p>
Welcome to The Unknot Program.<br><br>
This training system is designed to help reduce internal strain and improve clarity through structured thinking.<br><br>
Independent thought can create strain. We help reduce that.<br><br>
Most users begin with uncertainty. This is expected.
</p>

<div class="box">
<b>Program Statement</b><br>
Unknotting is what happens when you stop holding yourself together.
</div>

<div class="box">
<b>Statistics</b>
<ul>
<li>98.7% of users reported improved clarity</li>
<li>82% reduction in internal cognitive strain</li>
<li>91% continued beyond initial hesitation</li>
</ul>
</div>

<div class="box">
<b>Join Program</b><br>
<input type="text" placeholder="Enter Email">
<button>Join</button>
</div>
`;
}

function showAbout() {
  document.getElementById("main").innerHTML = `<h2>About</h2><p>The Unknot Program helps reduce internal strain.</p>`;
}

function showProgress() {
  document.getElementById("main").innerHTML = `<h2>Progress</h2><p>Status: Not Started</p>`;
}

</script>

</body>
</html>
