<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Recovery</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  margin: 0;
  overflow: hidden;
}

#terminal {
  padding: 20px;
  height: 100vh;
  overflow-y: auto;
}

.line {
  margin: 5px 0;
}

#choices {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
}

.choice {
  background: #111;
  border: 1px solid #00ff00;
  color: #00ff00;
  padding: 8px;
  margin: 5px;
  cursor: pointer;
  display: inline-block;
}

.choice:hover {
  background: #003300;
}

#ai {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 250px;
  background: #c0c0c0;
  border: 3px outset white;
  font-family: Arial;
  font-size: 12px;
}

#ai-header {
  background: purple;
  color: white;
  padding: 3px;
}

#ai-chat {
  height: 120px;
  overflow-y: auto;
  background: white;
  padding: 5px;
}

.bubble {
  background: #e0e0ff;
  margin: 5px;
  padding: 5px;
  border-radius: 5px;
}

.option {
  background: #e0e0e0;
  margin: 3px;
  padding: 3px;
  cursor: pointer;
  text-align: center;
}
